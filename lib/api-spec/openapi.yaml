openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Jastip Anggun Jaya API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: batches
    description: Batch pengiriman management
  - name: packages
    description: Package management
  - name: customers
    description: Customer management
  - name: admins
    description: Admin management
  - name: reports
    description: Reports and analytics
  - name: dashboard
    description: Dashboard data

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login for customer, admin, or owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current logged-in user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  # ─── BATCHES ────────────────────────────────────────────────────────────────

  /batches:
    get:
      operationId: listBatches
      tags: [batches]
      summary: List all batches with package count
      parameters:
        - name: statusBatch
          in: query
          schema:
            type: string
            enum: [OPEN, CLOSED, ARSIP]
      responses:
        "200":
          description: List of batches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BatchWithCount"
    post:
      operationId: createBatch
      tags: [batches]
      summary: Create a new batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchInput"
      responses:
        "201":
          description: Batch created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"

  /batches/{id}:
    get:
      operationId: getBatch
      tags: [batches]
      summary: Get batch detail with packages grouped
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Batch detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDetail"
    patch:
      operationId: updateBatch
      tags: [batches]
      summary: Update batch status or details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchUpdate"
      responses:
        "200":
          description: Batch updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"

  /batches/service-types/list:
    get:
      operationId: listServiceTypes
      tags: [batches]
      summary: List all service types
      responses:
        "200":
          description: Service types list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceType"

  # ─── PACKAGES ───────────────────────────────────────────────────────────────

  /packages:
    get:
      operationId: listPackages
      tags: [packages]
      summary: List packages (filtered by role)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, diserahkan]
        - name: customerId
          in: query
          schema:
            type: ["integer", "null"]
        - name: adminId
          in: query
          schema:
            type: ["integer", "null"]
        - name: dateFrom
          in: query
          schema:
            type: ["string", "null"]
        - name: dateTo
          in: query
          schema:
            type: ["string", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: batchId
          in: query
          schema:
            type: ["integer", "null"]
        - name: serviceTypeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: statusPengambilan
          in: query
          schema:
            type: ["string", "null"]
        - name: statusVerifikasi
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Package"

    post:
      operationId: createPackage
      tags: [packages]
      summary: Create a new package (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageInput"
      responses:
        "201":
          description: Package created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"

  /packages/import:
    post:
      operationId: importPackages
      tags: [packages]
      summary: Import packages from Excel data (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageImport"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /packages/{id}:
    get:
      operationId: getPackage
      tags: [packages]
      summary: Get package by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Package detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"

    patch:
      operationId: updatePackage
      tags: [packages]
      summary: Update package status (admin/owner)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageUpdate"
      responses:
        "200":
          description: Updated package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"

  /packages/scan/{barcode}:
    get:
      operationId: scanPackage
      tags: [packages]
      summary: Scan barcode and verify package ownership
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Package scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"

  /packages/{id}/serahkan:
    post:
      operationId: serahkanPackage
      tags: [packages]
      summary: Mark package as diserahkan (handed over to customer)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Package marked as diserahkan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"

  /packages/{id}/tolak:
    post:
      operationId: tolakPackage
      tags: [packages]
      summary: Reject a package (set back to pending)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Package rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"

  /packages/{id}/verify:
    post:
      operationId: verifyPackage
      tags: [packages]
      summary: Mark package as verified (sudah_diverifikasi)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Package verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"

  /packages/{id}/barcode:
    get:
      operationId: getBarcode
      tags: [packages]
      summary: Get barcode data for a package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Barcode data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BarcodeData"

  # ─── CUSTOMERS ──────────────────────────────────────────────────────────────

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers (admin/owner)
      parameters:
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerWithStats"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerWithStats"

  # ─── ADMINS ─────────────────────────────────────────────────────────────────

  /admins:
    get:
      operationId: listAdmins
      tags: [admins]
      summary: List all admins with package stats (owner only)
      responses:
        "200":
          description: List of admins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWithStats"

    post:
      operationId: createAdmin
      tags: [admins]
      summary: Create a new admin (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminInput"
      responses:
        "201":
          description: Admin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admins/{id}:
    patch:
      operationId: updateAdmin
      tags: [admins]
      summary: Update admin (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdate"
      responses:
        "200":
          description: Admin updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admins/{id}/toggle-active:
    post:
      operationId: toggleAdminActive
      tags: [admins]
      summary: Activate or deactivate admin (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Admin status toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admins/{id}/reset-password:
    post:
      operationId: resetAdminPassword
      tags: [admins]
      summary: Reset admin password (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ─── DASHBOARD ──────────────────────────────────────────────────────────────

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/chart:
    get:
      operationId: getDashboardChart
      tags: [dashboard]
      summary: Get chart data (daily package trend)
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [week, month, year]
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartPoint"

  # ─── REPORTS ────────────────────────────────────────────────────────────────

  /reports:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get report data (owner only)
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [daily, monthly, yearly]
        - name: date
          in: query
          schema:
            type: ["string", "null"]
        - name: month
          in: query
          schema:
            type: ["string", "null"]
        - name: year
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportData"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    LoginInput:
      type: object
      required: [phone, password]
      properties:
        phone:
          type: string
        password:
          type: string

    RegisterInput:
      type: object
      required: [name, phone, password]
      properties:
        name:
          type: string
        phone:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, name, phone, role, isActive]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [customer, admin, owner]
        isActive:
          type: boolean
        createdAt:
          type: string

    Package:
      type: object
      required:
        [
          id,
          barcode,
          resiNumber,
          itemName,
          status,
          customerId,
          customerName,
          createdAt,
        ]
      properties:
        id:
          type: integer
        barcode:
          type: string
        resiNumber:
          type: string
        packageNumber:
          type: ["string", "null"]
        itemName:
          type: string
        realWeight:
          type: ["number", "null"]
        length:
          type: ["number", "null"]
        width:
          type: ["number", "null"]
        height:
          type: ["number", "null"]
        volumeWeight:
          type: ["number", "null"]
        packagingType:
          type: ["string", "null"]
        usedWeight:
          type: ["number", "null"]
        shippingRate:
          type: ["number", "null"]
        totalWeight:
          type: ["number", "null"]
        price:
          type: ["number", "null"]
        totalShipping:
          type: ["number", "null"]
        weight:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, diserahkan]
        verified:
          type: string
          enum: [belum_diverifikasi, sudah_diverifikasi]
        verifiedAt:
          type: ["string", "null"]
        statusVerifikasi:
          type: string
          enum: [BELUM_DIVERIFIKASI, SUDAH_DIVERIFIKASI]
        statusPengambilan:
          type: string
          enum: [BELUM_DIAMBIL, SUDAH_DIAMBIL]
        statusPembayaran:
          type: string
          enum: [BELUM_DIBAYAR, DP, SUDAH_DIBAYAR]
        batchId:
          type: ["integer", "null"]
        serviceTypeId:
          type: ["integer", "null"]
        serviceType:
          type: ["string", "null"]
        customerId:
          type: ["integer", "null"]
        customerName:
          type: string
        customerPhone:
          type: ["string", "null"]
        adminId:
          type: ["integer", "null"]
        adminName:
          type: ["string", "null"]
        packageDate:
          type: ["string", "null"]
        pickedUpAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    PackageInput:
      type: object
      required: [resiNumber, batchId]
      properties:
        batchId:
          type: integer
        resiNumber:
          type: string
        packageNumber:
          type: ["string", "null"]
        itemName:
          type: string
        realWeight:
          type: ["number", "null"]
        length:
          type: ["number", "null"]
        width:
          type: ["number", "null"]
        height:
          type: ["number", "null"]
        volumeWeight:
          type: ["number", "null"]
        packagingType:
          type: ["string", "null"]
        usedWeight:
          type: ["number", "null"]
        shippingRate:
          type: ["number", "null"]
        totalWeight:
          type: ["number", "null"]
        price:
          type: ["number", "null"]
        totalShipping:
          type: ["number", "null"]
        weight:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        customerId:
          type: integer
        packageDate:
          type: ["string", "null"]
          serviceType:
            type: ["string", "null"]

    PackageUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, diserahkan]
        notes:
          type: ["string", "null"]

    PackageImport:
      type: object
      required: [packages, batchId]
      properties:
        batchId:
          type: integer
        packages:
          type: array
          items:
            $ref: "#/components/schemas/PackageRow"

    PackageRow:
      type: object
      required: [resiNumber, customerPhone]
      properties:
        packageDate:
          type: ["string", "null"]
        resiNumber:
          type: string
        packageNumber:
          type: ["string", "null"]
        customerPhone:
          type: string
        itemName:
          type: ["string", "null"]
        realWeight:
          type: ["number", "null"]
        length:
          type: ["number", "null"]
        width:
          type: ["number", "null"]
        height:
          type: ["number", "null"]
        volumeWeight:
          type: ["number", "null"]
        packagingType:
          type: ["string", "null"]
        usedWeight:
          type: ["number", "null"]
        shippingRate:
          type: ["number", "null"]
        totalWeight:
          type: ["number", "null"]
        price:
          type: ["number", "null"]
        totalShipping:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]

    ImportResult:
      type: object
      required: [success, failed, total]
      properties:
        success:
          type: integer
        failed:
          type: integer
        total:
          type: integer
        errors:
          type: array
          items:
            type: string

    ScanResult:
      type: object
      required: [valid, message]
      properties:
        valid:
          type: boolean
        message:
          type: string
        package:
          $ref: "#/components/schemas/Package"

    BarcodeData:
      type: object
      required: [barcode, packageId, resiNumber, itemName, customerName]
      properties:
        barcode:
          type: string
        packageId:
          type: integer
        resiNumber:
          type: string
        itemName:
          type: string
        customerName:
          type: string

    CustomerWithStats:
      type: object
      required:
        [
          id,
          name,
          phone,
          isActive,
          totalPackages,
          pendingPackages,
          pickedUpPackages,
        ]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
        totalPackages:
          type: integer
        pendingPackages:
          type: integer
        pickedUpPackages:
          type: integer

    AdminWithStats:
      type: object
      required: [id, name, phone, isActive, packagesInputted]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
        packagesInputted:
          type: integer

    AdminInput:
      type: object
      required: [name, phone, password]
      properties:
        name:
          type: string
        phone:
          type: string
        password:
          type: string

    AdminUpdate:
      type: object
      properties:
        name:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]

    ResetPasswordInput:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string

    DashboardSummary:
      type: object
      required:
        [
          totalPackages,
          pendingPackages,
          pickedUpPackages,
          totalCustomers,
          totalAdmins,
          readyPackages,
        ]
      properties:
        totalPackages:
          type: integer
        pendingPackages:
          type: integer
        readyPackages:
          type: integer
        pickedUpPackages:
          type: integer
        totalCustomers:
          type: integer
        totalAdmins:
          type: integer

    ChartPoint:
      type: object
      required: [date, incoming, outgoing]
      properties:
        date:
          type: string
        incoming:
          type: integer
        outgoing:
          type: integer

    ReportData:
      type: object
      required: [period, totalPackages, pickedUp, pending, entries]
      properties:
        period:
          type: string
        totalPackages:
          type: integer
        pickedUp:
          type: integer
        pending:
          type: integer
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ReportEntry"

    ReportEntry:
      type: object
      required: [label, incoming, outgoing]
      properties:
        label:
          type: string
        incoming:
          type: integer
        outgoing:
          type: integer

    ServiceType:
      type: object
      required: [id, name, label]
      properties:
        id:
          type: integer
        name:
          type: string
        label:
          type: string

    Batch:
      type: object
      required: [id, namaKapal, etd, periodeClosingMulai, periodeClosingSelesai, kotaAsal, tujuan, statusBatch, label, createdAt]
      properties:
        id:
          type: integer
        namaKapal:
          type: string
        etd:
          type: string
        periodeClosingMulai:
          type: string
        periodeClosingSelesai:
          type: string
        kotaAsal:
          type: string
        tujuan:
          type: string
        statusBatch:
          type: string
          enum: [OPEN, CLOSED, ARSIP]
        label:
          type: string
        createdBy:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    BatchWithCount:
      allOf:
        - $ref: "#/components/schemas/Batch"
        - type: object
          properties:
            packageCount:
              type: integer

    BatchDetail:
      allOf:
        - $ref: "#/components/schemas/BatchWithCount"
        - type: object
          properties:
            groups:
              type: array
              items:
                type: object

    BatchInput:
      type: object
      required: [namaKapal, etd, periodeClosingMulai, periodeClosingSelesai, kotaAsal]
      properties:
        namaKapal:
          type: string
        etd:
          type: string
        periodeClosingMulai:
          type: string
        periodeClosingSelesai:
          type: string
